<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Obsidian | 因果交流电灯</title>

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      integrity="sha384-t1nt8BQoYMLFN5p42tRAtuAAFQaCQODekUVeKKZrEnEyp4H2R0RHFz0KWpmj7i8g"
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <style>
      @font-face {
        font-family: "Sarasa Gothic J";
        src: url("../fonts/Sarasa Gothic J.ttf") format("truetype");
        font-weight: normal;
        font-style: normal;
      }
      :root {
        --bg-color: #fcfaf2;
        --text-main: #262626;
        --text-muted: #707c74;
        --accent-cyan: #0089a7;
        --accent-light: #f0f7f8;
        --border-color: #c0d6d9;
        --topbar-height: 56px;
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html {
        scroll-behavior: smooth;
        scroll-padding-top: var(--topbar-height);
      }
      body {
        font-family:
          "Sarasa Gothic J",
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Helvetica,
          Arial,
          sans-serif;
        background-color: var(--bg-color);
        color: var(--text-main);
        line-height: 1.7;
        letter-spacing: 0.04em;
        -webkit-font-smoothing: antialiased;
      }
      .topbar {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        height: var(--topbar-height);
        display: flex;
        align-items: center;
        padding: 0 24px;
        background-color: rgba(252, 250, 242, 0.85);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border-bottom: 1px solid var(--border-color);
        z-index: 1000;
      }
      .topbar-brand {
        font-size: 16px;
        font-weight: 500;
        letter-spacing: 0.08em;
        color: var(--text-main);
        text-decoration: none;
        white-space: nowrap;
        flex-shrink: 0;
      }
      .topbar-nav {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 24px;
        flex: 1;
      }
      .topbar-nav-link {
        font-size: 14px;
        font-weight: 400;
        letter-spacing: 0.06em;
        color: var(--text-muted);
        text-decoration: none;
        padding: 6px 0;
        border-bottom: 2px solid transparent;
        transition:
          color 0.25s ease,
          border-color 0.25s ease;
      }
      .topbar-nav-link:hover,
      .topbar-nav-link--active {
        color: var(--accent-cyan);
        border-bottom-color: var(--accent-cyan);
      }
      .topbar-social {
        display: flex;
        align-items: center;
        gap: 4px;
        flex-shrink: 0;
      }
      .topbar-social-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 40px;
        height: 40px;
        border-radius: 50%;
        text-decoration: none;
        color: var(--text-muted);
        font-size: 20px;
        transition: all 0.25s ease;
      }
      .topbar-social-btn:hover {
        background-color: var(--accent-light);
        color: var(--accent-cyan);
      }
      .topbar-social-btn--qq:hover {
        color: #12b7f5;
      }
      .topbar-social-btn--github:hover {
        color: #24292f;
      }
      .topbar-social-btn--bilibili:hover {
        color: #fb7299;
      }
      .topbar-social-btn--email:hover {
        color: #ea4335;
      }
      @media (max-width: 680px) {
        .topbar-nav {
          display: none;
        }
      }
      .container {
        max-width: 800px;
        margin: 0 auto;
        padding: 24px 24px 80px;
      }
      .page-header {
        padding-top: calc(var(--topbar-height) + 40px);
        padding-bottom: 40px;
        border-bottom: 1px solid var(--border-color);
        margin-bottom: 40px;
      }
      .page-header h1 {
        font-size: 28px;
        font-weight: 500;
        letter-spacing: 0.1em;
        margin-bottom: 12px;
      }
      .page-header p {
        font-size: 15px;
        color: var(--text-muted);
        font-weight: 300;
      }
      .placeholder-box {
        padding: 60px 40px;
        background-color: rgba(255, 255, 255, 0.4);
        border: 1px dashed var(--border-color);
        color: var(--text-muted);
        font-size: 13px;
        font-weight: 300;
        letter-spacing: 0.15em;
        text-align: center;
      }
      footer {
        text-align: center;
        font-size: 11px;
        color: var(--text-muted);
        font-weight: 300;
        letter-spacing: 0.05em;
        border-top: 1px solid var(--border-color);
        padding-top: 30px;
        margin-top: 60px;
      }
    </style>
  </head>
  <body>
    <nav class="topbar">
      <a href="/" class="topbar-brand">因果交流电灯</a>
      <div class="topbar-nav">
        <a href="/Notes/" class="topbar-nav-link">学习笔记</a>
        <a href="/poshanbu/" class="topbar-nav-link">迫伞部</a>
        <a href="/Music/" class="topbar-nav-link">音乐</a>
        <a href="/Obsidian/" class="topbar-nav-link topbar-nav-link--active"
          >Obsidian</a
        >
        <a href="/Typography/" class="topbar-nav-link">字体</a>
      </div>
      <div class="topbar-social">
        <a
          href="https://github.com/sulcop5"
          class="topbar-social-btn topbar-social-btn--github"
          target="_blank"
          rel="noopener noreferrer"
          title="GitHub"
          aria-label="GitHub"
          ><i class="fa-brands fa-github" aria-hidden="true"></i
        ></a>
        <a
          href="https://space.bilibili.com/398278423"
          class="topbar-social-btn topbar-social-btn--bilibili"
          target="_blank"
          rel="noopener noreferrer"
          title="哔哩哔哩"
          aria-label="哔哩哔哩"
          ><i class="fa-brands fa-bilibili" aria-hidden="true"></i
        ></a>
        <a
          href="https://qm.qq.com/q/ScSc6UMCoq"
          class="topbar-social-btn topbar-social-btn--qq"
          target="_blank"
          rel="noopener noreferrer"
          title="点击链接加我为QQ好友"
          aria-label="QQ"
          ><i class="fa-brands fa-qq" aria-hidden="true"></i
        ></a>
        <a
          href="https://y.music.163.com/m/user?id=3384714585"
          class="topbar-social-btn"
          target="_blank"
          rel="noopener noreferrer"
          title="网易云音乐"
          aria-label="网易云音乐"
          ><i class="fa-solid fa-music" aria-hidden="true"></i
        ></a>
        <a
          href="mailto:2263467979@qq.com"
          class="topbar-social-btn topbar-social-btn--email"
          title="2263467979@qq.com"
          aria-label="Email"
          ><i class="fa-solid fa-envelope" aria-hidden="true"></i
        ></a>
      </div>
    </nav>

    <div class="container">
      <div class="page-header">
        <h1>Obsidian</h1>
        <p>Obsidian 使用技巧、插件推荐与工作流分享，打造你的第二大脑。</p>
      </div>
      <main>
        <div class="placeholder-box">Obsidian 教程内容整理中，敬请期待…</div>
      </main>
      <footer><p>&copy; 2026 因果交流电灯. Powered by GitHub Pages.</p></footer>
    </div>
  </body>
</html>
