<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sulcop5 | 个人空间</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;500;700&family=Noto+Serif+SC:wght@300;500;700&display=swap" rel="stylesheet">
    
    <style>
        /* 日本传统色与排版变量定义 */
        :root {
            --bg-color: #FCFAF2;       /* 象牙色 (Ivory White) */
            --text-main: #262626;     /* 墨色 (Sumi Black) */
            --text-muted: #707C74;    /* 苔色 (Muted Grey-Green) */
            --accent-cyan: #0089A7;   /* 缥色 (Traditional Cyan) */
            --accent-light: #F0F7F8;  /* 浅缥底衬 */
            --border-color: #C0D6D9;  /* 青灰细线 */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Noto Serif SC', 'Noto Serif JP', 'Georgia', serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.8;
            letter-spacing: 0.06em; /* 稍微加宽字距，模仿高端字形站排版 */
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 80px 24px;
        }

        /* 头图与个人介绍区域 */
        header {
            text-align: center;
            padding-bottom: 60px;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 60px;
        }

        .avatar-container {
            width: 120px;
            height: 120px;
            margin: 0 auto 24px;
            border: 1px solid var(--border-color);
            padding: 6px;
            background-color: #FFFFFF;
            border-radius: 2px;
        }

        .avatar {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(10%) contrast(95%); /* 微调头像使其契合复古明朝体风格 */
        }

        h1 {
            font-size: 26px;
            font-weight: 500;
            letter-spacing: 0.12em;
            color: var(--text-main);
            margin-bottom: 12px;
        }

        .profile-bio {
            font-size: 14px;
            color: var(--text-muted);
            font-weight: 300;
            max-width: 500px;
            margin: 0 auto;
            text-align: justify;
            text-justify: inter-word;
        }

        /* 板块通用样式 */
        section {
            margin-bottom: 70px;
        }

        .section-title {
            font-size: 18px;
            font-weight: 500;
            color: var(--text-main);
            position: relative;
            padding-bottom: 10px;
            margin-bottom: 28px;
            letter-spacing: 0.08em;
        }

        /* 标题下方的细青线 */
        .section-title::after {
            content: '';
            position: absolute;
            left: 0;
            bottom: 0;
            width: 40px;
            height: 1px;
            background-color: var(--accent-cyan);
        }

        /* 迫伞部官网 - 链接卡片排版 */
        .link-grid {
            display: block;
        }

        .link-card {
            display: block;
            text-decoration: none;
            padding: 20px;
            background-color: #FFFFFF;
            border: 1px solid var(--border-color);
            margin-bottom: 14px;
            transition: all 0.35s ease;
        }

        .link-card:hover {
            border-color: var(--accent-cyan);
            background-color: var(--accent-light);
            transform: translateX(4px); /* 优雅的向右微动效果 */
        }

        .link-title {
            font-size: 15px;
            font-weight: 500;
            color: var(--accent-cyan);
            margin-bottom: 4px;
        }

        .link-url {
            font-size: 12px;
            color: var(--text-muted);
            font-family: monospace;
        }

        /* 待补充板块的极简占位样式 */
        .placeholder-box {
            padding: 40px;
            background-color: rgba(255, 255, 255, 0.4);
            border: 1px dashed var(--border-color);
            color: var(--text-muted);
            font-size: 13px;
            font-weight: 300;
            letter-spacing: 0.15em;
            text-align: center;
        }

        /* 页脚 */
        footer {
            text-align: center;
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 120px;
            font-weight: 300;
            letter-spacing: 0.05em;
            border-top: 1px solid var(--border-color);
            padding-top: 30px;
        }
    </style>
</head>
<body>

    <div class="container">
        
        <header>
            <div class="avatar-container">
                <img src="avatar.jpg" alt="Sulcop5" class="avatar">
            </div>
            <h1>Sulcop5</h1>
            <div class="profile-bio">
                这里是 Sulcop5 的静态空间。建立此处的初衷在于有条理地整理个人学习笔记，沉淀关于音乐、字体排版以及效率工具 Obsidian 的使用心得。
            </div>
        </header>

        <main>
            <section id="poshanbu">
                <h2 class="section-title">迫伞部官网</h2>
                <div class="link-grid">
                    <a href="https://sulcop5.github.io" class="link-card" target="_blank">
                        <div class="link-title">迫伞部 官方网站 ↗</div>
                        <div class="link-url">https://sulcop5.github.io</div>
                    </a>
                    <a href="https://space.bilibili.com/3546769984064032" class="link-card" target="_blank">
                        <div class="link-title">迫伞部 哔哩哔哩官方频道 ↗</div>
                        <div class="link-url">space.bilibili.com/3546769984064032</div>
                    </a>
                </div>
            </section>

            <section id="notes">
                <h2 class="section-title">学习笔记整理</h2>
                <div class="placeholder-box">待补充</div>
            </section>

            <section id="music">
                <h2 class="section-title">音乐相关内容</h2>
                <div class="placeholder-box">待补充</div>
            </section>

            <section id="obsidian">
                <h2 class="section-title">Obsidian 教程</h2>
                <div class="placeholder-box">待补充</div>
            </section>

            <section id="typography">
                <h2 class="section-title">字体相关内容</h2>
                <div class="placeholder-box">待补充</div>
            </section>
        </main>

        <footer>
            <p>&copy; 2026 Sulcop5. Powered by GitHub Pages.</p>
        </footer>

    </div>

</body>
</html>
