<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>因果交流电灯 | 个人空间</title>
    
    <style>
        /* 1. 声明并引入同级目录下的自定义字体 Sarasa Gothic J */
        @font-face {
            font-family: 'Sarasa Gothic J';
            src: url('Sarasa Gothic J.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        /* 日本传统色与排版变量定义 */
        :root {
            --bg-color: #FCFAF2;       /* 象牙色 (Ivory White) */
            --text-main: #262626;     /* 墨色 (Sumi Black) */
            --text-muted: #707C74;    /* 苔色 (Muted Grey-Green) */
            --accent-cyan: #0089A7;   /* 缥色 (Traditional Cyan) */
            --accent-light: #F0F7F8;  /* 浅缥底衬 */
            --border-color: #C0D6D9;  /* 青灰细线 */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            /* 优先使用你指定的 Sarasa Gothic J 字体 */
            font-family: 'Sarasa Gothic J', -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.7;
            letter-spacing: 0.04em; /* 根据黑体特性微调字距 */
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 80px 24px;
        }

        /* 头图与个人介绍区域 */
        header {
            text-align: center;
            padding-bottom: 60px;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 60px;
        }

        /* 放大后的头像容器（从 120px 扩大至 180px） */
        .avatar-container {
            width: 180px;
            height: 180px;
            margin: 0 auto 28px;
            border: 1px solid var(--border-color);
            padding: 6px;
            background-color: #FFFFFF;
            border-radius: 2px;
        }

        .avatar {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        h1 {
            font-size: 28px;
            font-weight: 500;
            letter-spacing: 0.1em;
            color: var(--text-main);
            margin-bottom: 16px;
        }

        .profile-bio {
            font-size: 15px;
            color: var(--text-muted);
            font-weight: 300;
            letter-spacing: 0.08em;
        }

        /* 板块通用样式 */
        section {
            margin-bottom: 70px;
        }

        .section-title {
            font-size: 18px;
            font-weight: 500;
            color: var(--text-main);
            position: relative;
            padding-bottom: 10px;
            margin-bottom: 28px;
            letter-spacing: 0.08em;
        }

        /* 标题下方的细青线 */
        .section-title::after {
            content: '';
            position: absolute;
            left: 0;
            bottom: 0;
            width: 40px;
            height: 1px;
            background-color: var(--accent-cyan);
        }

        /* 迫伞部官网 - 链接卡片排版 */
        .link-grid {
            display: block;
        }

        .link-card {
            display: block;
            text-decoration: none;
            padding: 20px;
            background-color: #FFFFFF;
            border: 1px solid var(--border-color);
            margin-bottom: 14px;
            transition: all 0.35s ease;
        }

        .link-card:hover {
            border-color: var(--accent-cyan);
            background-color: var(--accent-light);
            transform: translateX(4px);
        }

        .link-title {
            font-size: 15px;
            font-weight: 500;
            color: var(--accent-cyan);
            margin-bottom: 4px;
        }

        .link-url {
            font-size: 12px;
            color: var(--text-muted);
            font-family: monospace;
        }

        /* 待补充板块的极简占位样式 */
        .placeholder-box {
            padding: 40px;
            background-color: rgba(255, 255, 255, 0.4);
            border: 1px dashed var(--border-color);
            color: var(--text-muted);
            font-size: 13px;
            font-weight: 300;
            letter-spacing: 0.15em;
            text-align: center;
        }

        /* 页脚 */
        footer {
            text-align: center;
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 120px;
            font-weight: 300;
            letter-spacing: 0.05em;
            border-top: 1px solid var(--border-color);
            padding-top: 30px;
        }
    </style>
</head>
<body>

    <div class="container">
        
        <!-- 头图与个人介绍 -->
        <header>
            <div class="avatar-container">
                <img src="avatar.jpg" alt="因果交流电灯" class="avatar">
            </div>
            <h1>因果交流电灯</h1>
            <div class="profile-bio">
                幸せでありますように。
            </div>
        </header>

        <main>
            <!-- 1. 迫伞部官网板块 -->
            <section id="poshanbu">
                <h2 class="section-title">迫伞部官网</h2>
                <div class="link-grid">
                    <a href="https://sulcop5.github.io" class="link-card" target="_blank">
                        <div class="link-title">迫伞部 官方网站 ↗</div>
                        <div class="link-url">https://sulcop5.github.io</div>
                    </a>
                    <a href="https://space.bilibili.com/3546769984064032" class="link-card" target="_blank">
                        <div class="link-title">迫伞部 哔哩哔哩官方频道 ↗</div>
                        <div class="link-url">space.bilibili.com/3546769984064032</div>
                    </a>
                </div>
            </section>

            <!-- 2. 学习笔记 -->
            <section id="notes">
                <h2 class="section-title">学习笔记整理</h2>
                <div class="placeholder-box">待补充</div>
            </section>

            <!-- 3. 音乐 -->
            <section id="music">
                <h2 class="section-title">音乐相关内容</h2>
                <div class="placeholder-box">待补充</div>
            </section>

            <!-- 4. Obsidian 教程 -->
            <section id="obsidian">
                <h2 class="section-title">Obsidian 教程</h2>
                <div class="placeholder-box">待补充</div>
            </section>

            <!-- 5. 字体 -->
            <section id="typography">
                <h2 class="section-title">字体相关内容</h2>
                <div class="placeholder-box">待补充</div>
            </section>
        </main>

        <!-- 页脚 -->
        <footer>
            <p>&copy; 2026 因果交流电灯. Powered by GitHub Pages.</p>
        </footer>

    </div>

</body>
</html>
